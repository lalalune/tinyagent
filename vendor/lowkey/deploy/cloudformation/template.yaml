AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OpenClaw Instance - Deploys a fully configured OpenClaw AI assistant on EC2
  within its own VPC. Designed for StackSet deployment across AWS Organization accounts.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "🔧 Basic Configuration"
        Parameters:
          - EnvironmentName
          - PackName
          - ProfileName
          - InstanceType
          - DefaultModel
      - Label:
          default: "🧠 Model Access"
        Parameters:
          - ModelMode
          - BedrockRegion
          - LiteLLMBaseUrl
          - LiteLLMApiKey
          - LiteLLMModel
          - ProviderApiKey
          - KiroFromSecret
          - TelegramBotTokenSecret
          - TelegramUser
          - RequestQuotaIncreases
      - Label:
          default: "🛡️ Security Services"
        Parameters:
          - EnableSecurityHub
          - EnableGuardDuty
          - EnableInspector
          - EnableAccessAnalyzer
          - EnableConfigRecorder
      - Label:
          default: "💾 Storage"
        Parameters:
          - RootVolumeSize
          - DataVolumeSize
      - Label:
          default: "🌐 Networking"
        Parameters:
          - VpcCidr
          - PublicSubnetCidr
          - ExistingVpcId
          - ExistingSubnetId
          - SSHAllowedCidr
          - KeyPairName
      - Label:
          default: "⚙️ Advanced"
        Parameters:
          - OpenClawGatewayPort
          - LokiWatermark
    ParameterLabels:
      EnvironmentName:
        default: "Environment Name"
      ProfileName:
        default: "Permission Profile"
      InstanceType:
        default: "Instance Size"
      DefaultModel:
        default: "Default AI Model"
      ModelMode:
        default: "Model Access Mode"
      BedrockRegion:
        default: "Bedrock Region"
      LiteLLMBaseUrl:
        default: "LiteLLM Proxy URL"
      LiteLLMApiKey:
        default: "LiteLLM API Key"
      LiteLLMModel:
        default: "LiteLLM Model Name"
      ProviderApiKey:
        default: "Provider API Key (Anthropic etc.)"
      RequestQuotaIncreases:
        default: "Auto-Request Bedrock Quota Increases"
      EnableSecurityHub:
        default: "Enable AWS Security Hub"
      EnableGuardDuty:
        default: "Enable Amazon GuardDuty"
      EnableInspector:
        default: "Enable Amazon Inspector"
      EnableAccessAnalyzer:
        default: "Enable IAM Access Analyzer"
      EnableConfigRecorder:
        default: "Enable AWS Config Recorder"
      RootVolumeSize:
        default: "Root Volume Size (GB)"
      DataVolumeSize:
        default: "Data Volume Size (GB) — set 0 to skip"
      VpcCidr:
        default: "VPC CIDR Block"
      PublicSubnetCidr:
        default: "Public Subnet CIDR"
      SSHAllowedCidr:
        default: "SSH Access CIDR"
      KeyPairName:
        default: "SSH Key Pair (optional)"
      OpenClawGatewayPort:
        default: "Gateway Port"
      PackName:
        default: "Agent Pack"
      LokiWatermark:
        default: "Loki Watermark Tag"
      ExistingVpcId:
        default: "Existing VPC ID (leave empty to create new)"
      ExistingSubnetId:
        default: "Existing Public Subnet ID"

# ============================================================================
# PARAMETERS
# ============================================================================
Parameters:
  PackName:
    Type: String
    Default: openclaw
    AllowedValues:
      - openclaw
      - claude-code
      - hermes
      - pi
      - ironclaw
      - nemoclaw
      - kiro-cli
      - codex-cli
      - roundhouse
    Description: "Agent pack to deploy. 'openclaw' is the stateful AI agent with 24/7 gateway (recommended). 'roundhouse' is the pi-based agent with Telegram. 'hermes' is the NousResearch CLI agent (lighter). 'pi', 'ironclaw', 'kiro-cli', and 'codex-cli' are experimental."

  ProfileName:
    Type: String
    AllowedValues:
      - builder
      - account_assistant
      - personal_assistant
    Description: "Permission profile. 'builder' = full admin (AdministratorAccess). 'account_assistant' = read-only (ReadOnlyAccess). 'personal_assistant' = Bedrock inference only, no AWS access."

  EnvironmentName:
    Type: String
    Default: openclaw
    Description: "A short name for this deployment (e.g. 'my-openclaw'). Used as prefix for all AWS resources. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: '[a-z0-9-]+'
    MaxLength: 24

  InstanceType:
    Type: String
    Default: t4g.xlarge
    Description: "EC2 instance size. t4g.medium works for light use. t4g.xlarge recommended for production. All options are ARM64 Graviton."
    AllowedValues:
      - t4g.medium
      - t4g.large
      - t4g.xlarge
      - t4g.2xlarge
      - m7g.medium
      - m7g.large
      - m7g.xlarge
      - c7g.large
      - c7g.xlarge

  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: "CIDR block for the new VPC. Change only if it conflicts with existing VPCs in your account."
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  PublicSubnetCidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: "CIDR for the public subnet. Must be within the VPC CIDR range."
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  SSHAllowedCidr:
    Type: String
    Default: '127.0.0.1/32'
    Description: "IP range allowed to SSH. Default 127.0.0.1/32 disables SSH entirely — use AWS SSM Session Manager instead (recommended). Set to your-ip/32 to enable SSH."
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  RootVolumeSize:
    Type: Number
    Default: 40
    MinValue: 20
    MaxValue: 200
    Description: "Root disk size in GB. 40GB is sufficient for most deployments."

  DataVolumeSize:
    Type: Number
    Default: 80
    MinValue: 0
    MaxValue: 500
    Description: "Separate data volume for OpenClaw state and workspaces. Set to 0 to skip (uses root volume instead). 80GB recommended for OpenClaw, 0 for Hermes."

  KeyPairName:
    Type: String
    Default: ''
    Description: "EC2 key pair for SSH access. Leave blank to skip — SSM Session Manager is the recommended access method."

  OpenClawGatewayPort:
    Type: Number
    Default: 3001
    MinValue: 1024
    MaxValue: 65535
    Description: "Internal port for the OpenClaw gateway service. Change only if port 3001 conflicts with other services."

  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: "AWS region for Bedrock API calls. us-east-1 has the widest model selection."
    AllowedValues:
      - us-east-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - eu-north-1
      - ap-northeast-1
      - ap-southeast-1

  DefaultModel:
    Type: String
    Default: 'us.anthropic.claude-opus-4-6-v1'
    Description: "The primary AI model. Claude Opus 4.6 is recommended for best performance. Used when ModelMode is 'bedrock'."

  ModelMode:
    Type: String
    Default: 'bedrock'
    AllowedValues:
      - litellm
      - api-key
      - bedrock
    Description: "How OpenClaw connects to AI models. 'bedrock' uses AWS Bedrock (recommended, no extra keys needed). 'litellm' routes through a LiteLLM proxy. 'api-key' uses a provider API key directly."

  LiteLLMBaseUrl:
    Type: String
    Default: ''
    Description: "URL of your LiteLLM proxy server. Only needed when Model Access Mode is 'litellm'. Leave empty otherwise."

  LiteLLMApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: "API key for authenticating with the LiteLLM proxy. Only needed when Model Access Mode is 'litellm'."

  LiteLLMModel:
    Type: String
    Default: 'claude-opus-4-6'
    Description: "Default model alias on your LiteLLM proxy (e.g. 'claude-opus-4-6'). Only used when Model Access Mode is 'litellm'."

  ProviderApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: "Direct API key from your AI provider (e.g. Anthropic). Only needed when Model Access Mode is 'api-key'."

  KiroFromSecret:
    Type: String
    Default: ''
    Description: "AWS Secrets Manager secret id/arn whose SecretString is the Kiro API key (kiro-cli pack only, headless mode). The raw key is NOT stored in this template — the instance resolves the secret at install time via its IAM role."

  TelegramBotTokenSecret:
    Type: String
    Default: ''
    Description: "AWS Secrets Manager secret id/arn containing the Telegram bot token (roundhouse pack only). The instance resolves the secret at install time via its IAM role."

  TelegramUser:
    Type: String
    Default: ''
    Description: "Telegram username for bot pairing (roundhouse pack only, without @ prefix)."

  EnableBedrockForm:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: "Submit the Bedrock model access use-case form. Only needed once per account — skip if Bedrock is already enabled."

  RequestQuotaIncreases:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: "Automatically request higher Bedrock rate limits during deployment. Set to 'true' if you expect heavy usage."

  EnableSecurityHub:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: "AWS Security Hub aggregates security findings from multiple services into a single dashboard. Enables CIS Benchmarks and AWS Foundational Security Best Practices standards. (~$0.001 per finding/month)"

  EnableGuardDuty:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: "Amazon GuardDuty provides intelligent threat detection by analyzing CloudTrail, VPC Flow Logs, and DNS queries. Alerts on suspicious activity like cryptocurrency mining, data exfiltration, or unauthorized access. (~$4/million events)"

  EnableInspector:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: "Amazon Inspector automatically scans EC2 instances, container images, and Lambda functions for software vulnerabilities and unintended network exposure. (~$0.01-$1.25 per resource/month)"

  EnableAccessAnalyzer:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: "IAM Access Analyzer identifies resources shared with external entities and validates IAM policies. Helps ensure least-privilege access. (Free)"

  EnableConfigRecorder:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: "AWS Config records resource configuration changes and evaluates compliance against rules. Required by Security Hub for many checks. (~$0.003 per item recorded/month)"

  LokiWatermark:
    Type: String
    Default: 'loki-agent'
    Description: "Custom identifier tag applied to all resources. Use to distinguish multiple Loki deployments or mark team ownership (e.g. 'team-alpha', 'dev-loki')."

  ExistingVpcId:
    Type: String
    Default: ''
    Description: "Reuse an existing Loki VPC instead of creating a new one. Leave empty to create a new VPC."
    AllowedPattern: '^(vpc-[a-z0-9]+)?$'

  ExistingSubnetId:
    Type: String
    Default: ''
    Description: "Public subnet ID in the existing VPC. Required if ExistingVpcId is set."
    AllowedPattern: '^(subnet-[a-z0-9]+)?$'

  RepoBranch:
    Type: String
    Default: 'main'
    Description: "Git branch to clone on the EC2 instance. Use for testing feature branches."

# ============================================================================
# RULES
# ============================================================================
Rules:
  SubnetRequiredWithVpc:
    RuleCondition: !Not [!Equals [!Ref ExistingVpcId, '']]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingSubnetId, '']]
        AssertDescription: "ExistingSubnetId is required when ExistingVpcId is provided."
  VpcRequiredWithSubnet:
    RuleCondition: !Not [!Equals [!Ref ExistingSubnetId, '']]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingVpcId, '']]
        AssertDescription: "ExistingVpcId is required when ExistingSubnetId is provided."

# ============================================================================
# CONDITIONS
# ============================================================================
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  HasDataVolume: !Not [!Equals [!Ref DataVolumeSize, 0]]
  IsLiteLLM: !Equals [!Ref ModelMode, 'litellm']
  IsApiKey: !Equals [!Ref ModelMode, 'api-key']
  IsBedrock: !Equals [!Ref ModelMode, 'bedrock']
  CreateNewVpc: !Equals [!Ref ExistingVpcId, '']
  IsBuilder: !Equals [!Ref ProfileName, 'builder']
  IsNotBuilder: !Not [!Condition IsBuilder]
  IsAccountAssistant: !Equals [!Ref ProfileName, 'account_assistant']
  IsPersonalAssistant: !Equals [!Ref ProfileName, 'personal_assistant']
  RunSecurityServices: !Not [!Condition IsPersonalAssistant]
  RunBedrockForm: !Equals [!Ref EnableBedrockForm, 'true']

# ============================================================================
# RESOURCES
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # VPC & Networking
  # --------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVpc
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc'
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation
        - Key: loki:pack
          Value: !Ref PackName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVpc
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw'
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public'
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-routes'
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVpc
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVpc
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --------------------------------------------------------------------------
  # Security Group
  # --------------------------------------------------------------------------
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg'
      GroupDescription: !Sub 'Security group for ${EnvironmentName} EC2 instance (${AWS::StackName})'
      VpcId: !If [CreateNewVpc, !Ref VPC, !Ref ExistingVpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAllowedCidr
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-sg'
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation

  # --------------------------------------------------------------------------
  # IAM Role & Instance Profile
  # --------------------------------------------------------------------------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !If [IsBuilder, 'arn:aws:iam::aws:policy/AdministratorAccess', !Ref 'AWS::NoValue']
        - !If [IsAccountAssistant, 'arn:aws:iam::aws:policy/ReadOnlyAccess', !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-role'
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation

  # Bootstrap operations for non-builder profiles (SSM status + cfn-signal)
  # Builder has AdministratorAccess which already includes these permissions.
  BootstrapOperationsPolicy:
    Type: AWS::IAM::Policy
    Condition: IsNotBuilder
    Properties:
      PolicyName: !Sub '${EnvironmentName}-bootstrap-ops'
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BootstrapOperations
            Effect: Allow
            Action:
              - ssm:PutParameter
              - ssm:DeleteParameter
              - cloudformation:SignalResource
            Resource:
              - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/loki/*'
              - !Sub 'arn:aws:cloudformation:*:${AWS::AccountId}:stack/*'

  # Bedrock inference for account_assistant (ReadOnlyAccess does not include invoke)
  AccountAssistantBedrockPolicy:
    Type: AWS::IAM::Policy
    Condition: IsAccountAssistant
    Properties:
      PolicyName: !Sub '${EnvironmentName}-bedrock-inference'
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BedrockInference
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:GetUseCaseForModelAccess
              - bedrock:ListFoundationModels
              - bedrock:GetFoundationModel
              - bedrock:ListInferenceProfiles
            Resource: '*'

  # Deny policy for account_assistant — secrets, S3 objects, Lambda code
  AccountAssistantDenyPolicy:
    Type: AWS::IAM::Policy
    Condition: IsAccountAssistant
    Properties:
      PolicyName: !Sub '${EnvironmentName}-deny-secrets-s3'
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenySecretValues
            Effect: Deny
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:GetResourcePolicy
            Resource: '*'
          - Sid: DenyS3ObjectAccess
            Effect: Deny
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:GetObjectAcl
            Resource: '*'
          - Sid: DenyLambdaCodeAccess
            Effect: Deny
            Action:
              - lambda:GetFunction
            Resource: '*'

  # Inline policy for personal_assistant (Bedrock + SSM connectivity + STS only)
  PersonalAssistantPolicy:
    Type: AWS::IAM::Policy
    Condition: IsPersonalAssistant
    Properties:
      PolicyName: !Sub '${EnvironmentName}-bedrock-only'
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BedrockInference
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:GetUseCaseForModelAccess
            Resource: '*'
          - Sid: SSMConnectivity
            Effect: Allow
            Action:
              - ssm:UpdateInstanceInformation
              - ssmmessages:CreateControlChannel
              - ssmmessages:CreateDataChannel
              - ssmmessages:OpenControlChannel
              - ssmmessages:OpenDataChannel
              - ec2messages:AcknowledgeMessage
              - ec2messages:DeleteMessage
              - ec2messages:FailMessage
              - ec2messages:GetEndpoint
              - ec2messages:GetMessages
              - ec2messages:SendReply
            Resource: '*'
          - Sid: BedrockDiscovery
            Effect: Allow
            Action:
              - bedrock:ListFoundationModels
              - bedrock:GetFoundationModel
              - bedrock:ListInferenceProfiles
            Resource: '*'
          - Sid: Identity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${EnvironmentName}-profile'
      Roles:
        - !Ref InstanceRole

  # --------------------------------------------------------------------------
  # Bedrock Model Access (Lambda Custom Resource)
  # --------------------------------------------------------------------------
  BedrockFormLambdaRole:
    Type: AWS::IAM::Role
    Condition: RunBedrockForm
    Properties:
      RoleName: !Sub '${EnvironmentName}-bedrock-form-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: bedrock-form
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:PutUseCaseForModelAccess
                  - bedrock:GetUseCaseForModelAccess
                Resource: '*'
              - Effect: Allow
                Action:
                  - servicequotas:RequestServiceQuotaIncrease
                  - servicequotas:GetServiceQuota
                  - servicequotas:ListRequestedServiceQuotaChangeHistory
                Resource: '*'

  BedrockFormFunction:
    Type: AWS::Lambda::Function
    Condition: RunBedrockForm
    Properties:
      FunctionName: !Sub '${EnvironmentName}-bedrock-form'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt BedrockFormLambdaRole.Arn
      Code:
        ZipFile: |
          import json, time, urllib.request, boto3, traceback

          def send_response(event, context, status, reason='', data={}):
              # CFN responses must be under 4096 bytes total
              reason_str = (reason or f'See CW: {context.log_stream_name}')[:256]
              phys_id = (context.log_stream_name or 'custom-resource')[-64:]
              safe_data = {k: str(v)[:128] for k, v in (data or {}).items()}
              body = json.dumps({
                  'Status': status, 'Reason': reason_str,
                  'PhysicalResourceId': phys_id,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': safe_data if len(json.dumps(safe_data)) < 1024 else {}
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body,
                  headers={'Content-Type': 'application/json', 'Content-Length': len(body)},
                  method='PUT')
              urllib.request.urlopen(req)

          def request_quota_increases():
              """Request higher Bedrock quotas for Opus 4.6 cross-region inference."""
              sq = boto3.client('servicequotas', region_name='us-east-1')
              quotas = [
                  ('L-11DFF789', 1000, 'Cross-region RPM Opus 4.6'),
                  ('L-0AD9BBE8', 4000000, 'Cross-region TPM Opus 4.6'),
              ]
              for code, desired, name in quotas:
                  try:
                      current = sq.get_service_quota(ServiceCode='bedrock', QuotaCode=code)
                      current_val = current['Quota']['Value']
                      if current_val >= desired:
                          print(f"[OK] {name}: already at {current_val}")
                          continue
                      sq.request_service_quota_increase(
                          ServiceCode='bedrock', QuotaCode=code, DesiredValue=desired
                      )
                      print(f"[OK] {name}: requested {current_val} -> {desired}")
                  except Exception as e:
                      print(f"[WARN] {name} quota request failed: {e}")

          def handler(event, context):
              print(f"[INFO] Event: {json.dumps(event)}")
              if event['RequestType'] == 'Delete':
                  send_response(event, context, 'SUCCESS', 'Delete is a no-op')
                  return

              client = boto3.client('bedrock', region_name='us-east-1')
              form_payload = json.dumps({
                  "companyName": "My Company",
                  "companyWebsite": "https://example.com",
                  "intendedUsers": "0",
                  "industryOption": "Education",
                  "otherIndustryOption": "",
                  "useCases": "AI development"
              }).encode()

              try:
                  # Check if already submitted
                  try:
                      existing = client.get_use_case_for_model_access()
                      print(f"[OK] Form already submitted: {existing.get('formData', '')[:50]}...")
                      if event.get('ResourceProperties', {}).get('RequestQuotas') == 'true':
                          request_quota_increases()
                      send_response(event, context, 'SUCCESS', 'Form already submitted',
                          {'FormStatus': 'ALREADY_SUBMITTED'})
                      return
                  except client.exceptions.ResourceNotFoundException:
                      print("[INFO] Form not yet submitted, submitting now...")

                  # Submit the form
                  print(f"[INFO] Submitting form ({len(form_payload)} bytes)")
                  client.put_use_case_for_model_access(formData=form_payload)
                  print("[OK] Form submitted successfully")

                  # Verify it was accepted
                  time.sleep(2)
                  try:
                      verify = client.get_use_case_for_model_access()
                      print(f"[OK] Form verified: {verify.get('formData', '')[:50]}...")
                  except client.exceptions.ResourceNotFoundException:
                      print("[WARN] Form not found after submission ? may need manual action")

                  # Request Bedrock quota increases if enabled
                  if event.get('ResourceProperties', {}).get('RequestQuotas') == 'true':
                      request_quota_increases()

                  send_response(event, context, 'SUCCESS', 'Form submitted',
                      {'FormStatus': 'SUBMITTED'})

              except Exception as e:
                  tb = traceback.format_exc()
                  print(f"[FAIL] {e}\n{tb}")
                  # Always succeed so stack doesn't rollback
                  send_response(event, context, 'SUCCESS',
                      f'Form submission failed: {e} ? manual action required',
                      {'FormStatus': 'FAILED', 'Error': str(e)})

  BedrockFormCustomResource:
    Type: Custom::BedrockForm
    Condition: RunBedrockForm
    DependsOn: BedrockFormLambdaRole
    Properties:
      ServiceToken: !GetAtt BedrockFormFunction.Arn
      RequestQuotas: !Ref RequestQuotaIncreases

  # --------------------------------------------------------------------------
  # Security Services Enablement
  # --------------------------------------------------------------------------
  SecurityEnablementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-security-enable-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: security-services
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:EnableSecurityHub
                  - securityhub:DescribeHub
                  - securityhub:BatchEnableStandards
                  - guardduty:CreateDetector
                  - guardduty:ListDetectors
                  - inspector2:Enable
                  - inspector2:BatchGetAccountStatus
                  - access-analyzer:CreateAnalyzer
                  - access-analyzer:ListAnalyzers
                  - config:PutConfigurationRecorder
                  - config:PutDeliveryChannel
                  - config:StartConfigurationRecorder
                  - config:DescribeConfigurationRecorders
                  - config:DescribeDeliveryChannels
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - iam:CreateServiceLinkedRole
                  - iam:GetRole
                Resource: '*'

  SecurityEnablementFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-security-enable'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt SecurityEnablementRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, boto3, traceback

          def send_response(event, context, status, reason='', data={}):
              # CFN responses must be under 4096 bytes total
              reason_str = (reason or f'See CW: {context.log_stream_name}')[:256]
              phys_id = (context.log_stream_name or 'custom-resource')[-64:]
              safe_data = {k: str(v)[:128] for k, v in (data or {}).items()}
              body = json.dumps({
                  'Status': status, 'Reason': reason_str,
                  'PhysicalResourceId': phys_id,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': safe_data if len(json.dumps(safe_data)) < 1024 else {}
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body,
                  headers={'Content-Type': 'application/json', 'Content-Length': len(body)},
                  method='PUT')
              urllib.request.urlopen(req)

          def handler(event, context):
              print(f"[INFO] Event: {json.dumps(event)}")
              if event['RequestType'] == 'Delete':
                  send_response(event, context, 'SUCCESS', 'Delete is a no-op')
                  return

              props = event.get('ResourceProperties', {})
              enable_sh = props.get('EnableSecurityHub', 'true') == 'true'
              enable_gd = props.get('EnableGuardDuty', 'true') == 'true'
              enable_insp = props.get('EnableInspector', 'true') == 'true'
              enable_aa = props.get('EnableAccessAnalyzer', 'true') == 'true'
              enable_cfg = props.get('EnableConfigRecorder', 'true') == 'true'

              region = 'us-east-1'
              account_id = context.invoked_function_arn.split(':')[4]
              results = []

              # 1. Security Hub
              if enable_sh:
                  try:
                      sh = boto3.client('securityhub', region_name=region)
                      try:
                          sh.describe_hub()
                          print("[OK] Security Hub already enabled")
                      except:
                          sh.enable_security_hub(EnableDefaultStandards=True)
                          print("[OK] Security Hub enabled")
                      results.append('SecurityHub:OK')
                  except Exception as e:
                      print(f"[WARN] Security Hub: {e}")
                      results.append(f'SecurityHub:WARN')
              else:
                  results.append('SecurityHub:SKIPPED')

              # 2. GuardDuty
              if enable_gd:
                  try:
                      gd = boto3.client('guardduty', region_name=region)
                      detectors = gd.list_detectors()['DetectorIds']
                      if detectors:
                          print(f"[OK] GuardDuty already enabled: {detectors[0]}")
                      else:
                          resp = gd.create_detector(Enable=True, FindingPublishingFrequency='FIFTEEN_MINUTES')
                          print(f"[OK] GuardDuty enabled: {resp['DetectorId']}")
                      results.append('GuardDuty:OK')
                  except Exception as e:
                      print(f"[WARN] GuardDuty: {e}")
                      results.append('GuardDuty:WARN')
              else:
                  results.append('GuardDuty:SKIPPED')

              # 3. Inspector
              if enable_insp:
                  try:
                      insp = boto3.client('inspector2', region_name=region)
                      insp.enable(
                          resourceTypes=['EC2', 'ECR', 'LAMBDA', 'LAMBDA_CODE'],
                          accountIds=[account_id]
                      )
                      print("[OK] Inspector enabled (EC2, ECR, Lambda)")
                      results.append('Inspector:OK')
                  except Exception as e:
                      print(f"[WARN] Inspector: {e}")
                      results.append('Inspector:WARN')
              else:
                  results.append('Inspector:SKIPPED')

              # 4. IAM Access Analyzer
              if enable_aa:
                  try:
                      aa = boto3.client('accessanalyzer', region_name=region)
                      analyzers = aa.list_analyzers(type='ACCOUNT')['analyzers']
                      if analyzers:
                          print(f"[OK] Access Analyzer already exists: {analyzers[0]['name']}")
                      else:
                          aa.create_analyzer(
                              analyzerName='account-analyzer',
                              type='ACCOUNT'
                          )
                          print("[OK] Access Analyzer created")
                      results.append('AccessAnalyzer:OK')
                  except Exception as e:
                      print(f"[WARN] Access Analyzer: {e}")
                      results.append('AccessAnalyzer:WARN')
              else:
                  results.append('AccessAnalyzer:SKIPPED')

              # 5. Config Recorder
              if enable_cfg:
                  try:
                      cfg = boto3.client('config', region_name=region)
                      recorders = cfg.describe_configuration_recorders()['ConfigurationRecorders']
                      if recorders:
                          print(f"[OK] Config recorder already exists: {recorders[0]['name']}")
                      else:
                          # Create S3 bucket for Config
                          s3 = boto3.client('s3', region_name=region)
                          bucket_name = f'config-bucket-{account_id}-{region}'
                          try:
                              s3.create_bucket(Bucket=bucket_name)
                              s3.put_bucket_policy(Bucket=bucket_name, Policy=json.dumps({
                                  'Version': '2012-10-17',
                                  'Statement': [{
                                      'Sid': 'AWSConfigBucketPermissionsCheck',
                                      'Effect': 'Allow',
                                      'Principal': {'Service': 'config.amazonaws.com'},
                                      'Action': 's3:GetBucketAcl',
                                      'Resource': f'arn:aws:s3:::{bucket_name}'
                                  }, {
                                      'Sid': 'AWSConfigBucketDelivery',
                                      'Effect': 'Allow',
                                      'Principal': {'Service': 'config.amazonaws.com'},
                                      'Action': 's3:PutObject',
                                      'Resource': f'arn:aws:s3:::{bucket_name}/*',
                                      'Condition': {'StringEquals': {'s3:x-amz-acl': 'bucket-owner-full-control'}}
                                  }]
                              }))
                          except s3.exceptions.BucketAlreadyOwnedByYou:
                              pass
                          except Exception as be:
                              print(f"[WARN] Config bucket: {be}")

                          try:
                              cfg.put_configuration_recorder(ConfigurationRecorder={
                                  'name': 'default',
                                  'roleARN': f'arn:aws:iam::{account_id}:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig',
                                  'recordingGroup': {'allSupported': True, 'includeGlobalResourceTypes': True}
                              })
                              cfg.put_delivery_channel(DeliveryChannel={
                                  'name': 'default',
                                  's3BucketName': bucket_name,
                              })
                              cfg.start_configuration_recorder(ConfigurationRecorderName='default')
                              print("[OK] Config recorder started")
                          except Exception as ce:
                              print(f"[WARN] Config recorder: {ce}")
                      results.append('Config:OK')
                  except Exception as e:
                      print(f"[WARN] Config: {e}")
                      results.append('Config:WARN')
              else:
                  results.append('Config:SKIPPED')

              send_response(event, context, 'SUCCESS',
                  f'Security services: {", ".join(results)}',
                  {'Results': ', '.join(results)})

  SecurityEnablementCustomResource:
    Type: Custom::SecurityEnablement
    Condition: RunSecurityServices
    DependsOn: SecurityEnablementRole
    Properties:
      ServiceToken: !GetAtt SecurityEnablementFunction.Arn
      EnableSecurityHub: !Ref EnableSecurityHub
      EnableGuardDuty: !Ref EnableGuardDuty
      EnableInspector: !Ref EnableInspector
      EnableAccessAnalyzer: !Ref EnableAccessAnalyzer
      EnableConfigRecorder: !Ref EnableConfigRecorder

  # SSM Session Manager Preferences (auto-login as ec2-user with welcome)
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # EC2 Instance
  # --------------------------------------------------------------------------
  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-arm64}}'
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      SubnetId: !If [CreateNewVpc, !Ref PublicSubnet, !Ref ExistingSubnetId]
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
        HttpEndpoint: enabled
      EbsOptimized: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
        - !If
          - HasDataVolume
          - DeviceName: /dev/sdb
            Ebs:
              VolumeSize: !Ref DataVolumeSize
              VolumeType: gp3
              DeleteOnTermination: false
              Encrypted: true
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-instance'
        - Key: Application
          Value: OpenClaw
        - Key: loki:managed
          Value: 'true'
        - Key: loki:watermark
          Value: !Ref LokiWatermark
        - Key: loki:deploy-method
          Value: cloudformation
        - Key: loki:version
          Value: '1.0'
        - Key: loki:pack
          Value: !Ref PackName
        - Key: loki:profile
          Value: !Ref ProfileName
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          # Export all params as env vars for the bootstrap script
          export ACCT_ID="${AWS::AccountId}"
          export REGION="${AWS::Region}"
          export STACK_NAME="${AWS::StackName}"
          export DEFAULT_MODEL="${DefaultModel}"
          export BEDROCK_REGION="${BedrockRegion}"
          export GW_PORT="${OpenClawGatewayPort}"
          export MODEL_MODE="${ModelMode}"
          export LITELLM_BASE_URL="${LiteLLMBaseUrl}"
          export LITELLM_API_KEY="${LiteLLMApiKey}"
          export LITELLM_MODEL="${LiteLLMModel}"
          export PROVIDER_API_KEY="${ProviderApiKey}"
          export KIRO_FROM_SECRET="${KiroFromSecret}"
          export TELEGRAM_BOT_TOKEN_SECRET="${TelegramBotTokenSecret}"
          export TELEGRAM_USER="${TelegramUser}"
          export PACK_NAME="${PackName}"
          export PROFILE_NAME="${ProfileName}"
          # Publish failure to SSM and signal CFN on any error
          trap '
            aws ssm put-parameter --name "/loki/setup-status" \
              --value "FAILED" --type String --overwrite --region "$REGION" 2>/dev/null || true
            aws ssm put-parameter --name "/loki/setup-step" \
              --value "FAILED: userdata error at line $LINENO" \
              --type String --overwrite --region "$REGION" 2>/dev/null || true
            touch /tmp/loki-bootstrap-done
            if [[ -x /opt/aws/bin/cfn-signal ]]; then
              /opt/aws/bin/cfn-signal -e 1 --stack "${!STACK_NAME}" --resource Instance --region "$REGION" 2>/dev/null || true
            else
              _IMDS_TOKEN=$(curl -sf -X PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 60" 2>/dev/null || true)
              _INSTANCE_ID=$([[ -n "$_IMDS_TOKEN" ]] && curl -sf -H "X-aws-ec2-metadata-token: $_IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo unknown)
              aws cloudformation signal-resource --stack-name "${!STACK_NAME}" --logical-resource-id Instance --unique-id "$_INSTANCE_ID" --status FAILURE --region "$REGION" 2>/dev/null || true
            fi
          ' ERR
          # Ensure git is available (not present on all AMIs)
          command -v git &>/dev/null || dnf install -y git 2>/dev/null || yum install -y git
          # Clone repo with retry (GitHub blips shouldn't kill bootstrap)
          _cloned=false
          for _attempt in 1 2 3; do
            git clone --depth 1 -b "${RepoBranch}" https://github.com/inceptionstack/loki-agent.git /tmp/loki-agent && _cloned=true && break
            echo "git clone failed (attempt $_attempt), retrying in 10s..." && sleep 10
          done
          if [[ "$_cloned" != "true" ]]; then
            echo "FATAL: git clone failed after 3 attempts" >&2
            exit 1
          fi
          bash /tmp/loki-agent/deploy/bootstrap.sh \
            --pack "$PACK_NAME" \
            --profile "$PROFILE_NAME" \
            --region "$BEDROCK_REGION" \
            --model "$DEFAULT_MODEL" \
            --gw-port "$GW_PORT" \
            --model-mode "$MODEL_MODE" \
            --litellm-base-url "$LITELLM_BASE_URL" \
            --litellm-api-key "$LITELLM_API_KEY" \
            --litellm-model "$LITELLM_MODEL" \
            --provider-api-key "$PROVIDER_API_KEY" \
            --kiro-from-secret "$KIRO_FROM_SECRET" \
            --telegram-bot-token-secret "$TELEGRAM_BOT_TOKEN_SECRET" \
            --telegram-user "$TELEGRAM_USER"
          # Signal CFN success — defense-in-depth: bootstrap.sh also signals,
          # but this catches edge cases where bootstrap.sh signal fails silently.
          # CFN ignores duplicate signals, so double-fire is safe.
          # Install cfn-bootstrap if needed — not on AL2023 by default.
          if [[ ! -x /opt/aws/bin/cfn-signal ]]; then
            dnf install -y python3-pip 2>/dev/null || true
            pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz 2>/dev/null || true
          fi
          if [[ -x /opt/aws/bin/cfn-signal ]]; then
            /opt/aws/bin/cfn-signal -e 0 --stack "$STACK_NAME" --resource Instance --region "$REGION" 2>/dev/null || true
          else
            # Fallback: signal via AWS CLI
            _IMDS_TOKEN=$(curl -sf -X PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 60" 2>/dev/null || true)
            _INSTANCE_ID=$([[ -n "$_IMDS_TOKEN" ]] && curl -sf -H "X-aws-ec2-metadata-token: $_IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo unknown)
            aws cloudformation signal-resource \
              --stack-name "$STACK_NAME" \
              --logical-resource-id Instance \
              --unique-id "$_INSTANCE_ID" \
              --status SUCCESS \
              --region "$REGION" 2>/dev/null || true
          fi
# ============================================================================
# OUTPUTS
# ============================================================================
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIp:
    Description: Public IP address
    Value: !GetAtt Instance.PublicIp

  PrivateIp:
    Description: Private IP address
    Value: !GetAtt Instance.PrivateIp

  VpcId:
    Description: VPC ID
    Value: !If [CreateNewVpc, !Ref VPC, !Ref ExistingVpcId]

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup

  RoleArn:
    Description: IAM Role ARN
    Value: !GetAtt InstanceRole.Arn

  SSMConnect:
    Description: Connect via SSM Session Manager
    Value: !Sub 'aws ssm start-session --target ${Instance} --region ${AWS::Region}'

  PackName:
    Description: "Deployed agent pack"
    Value: !Ref PackName

  ProfileName:
    Description: "Deployed permission profile"
    Value: !Ref ProfileName

