name: pi
version: "1.0.0"
type: agent
description: "Pi Coding Agent — minimal terminal coding harness (experimental)"

deps:
  - bedrockify

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.medium

params:
  - name: region
    description: "AWS region for Bedrock"
    default: us-east-1
  - name: model
    description: "Model ID passed to Pi via bedrockify (OpenAI-style). Generic Bedrock IDs are passed through as-is."
    default: "us.anthropic.claude-sonnet-4-6-v1"
  - name: bedrockify-port
    description: "Port where bedrockify is running"
    default: "8090"

health_check:
  command: "pi --version"
  timeout: 10

provides:
  commands:
    - pi
  services: []
