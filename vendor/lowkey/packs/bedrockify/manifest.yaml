name: bedrockify
version: "1.0.0"
type: base
description: "OpenAI-compatible proxy for Amazon Bedrock"

deps: []

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204

params:
  - name: region
    description: "AWS region for Bedrock"
    default: us-east-1
  - name: port
    description: "Proxy listen port"
    default: "8090"
  - name: model
    description: "Default Bedrock chat model"
    default: "us.anthropic.claude-opus-4-6-v1"
  - name: embed-model
    description: "Default Bedrock embedding model"
    default: "amazon.titan-embed-text-v2:0"

health_check:
  url: "http://127.0.0.1:${port}/"
  expect: '"status":"ok"'
  timeout: 15

provides:
  commands:
    - bedrockify
  services:
    - bedrockify
