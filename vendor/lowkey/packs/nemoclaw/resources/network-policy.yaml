# NemoClaw baseline network policy
# Declarative egress rules for the sandboxed OpenClaw agent.
#
# NOTE: bedrockify endpoint is NOT listed here.
# Inference routing is entirely host-side:
#   Agent → inference.local → OpenShell gateway (HOST) → localhost:8090 → bedrockify → Bedrock API
# The sandbox network never traverses the bedrockify/Bedrock boundary directly.

network:
  - name: telegram-api
    endpoints:
      - host: "api.telegram.org"
        port: 443
    binaries: ["*"]
    rules:
      - methods: ["POST", "GET"]
        paths: ["/*"]

  - name: npm-registry
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
    binaries: ["npm", "node"]
    rules:
      - methods: ["GET"]
        paths: ["/*"]

  - name: github
    endpoints:
      - host: "github.com"
        port: 443
      - host: "raw.githubusercontent.com"
        port: 443
    binaries: ["git", "curl"]
    rules:
      - methods: ["GET"]
        paths: ["/*"]
