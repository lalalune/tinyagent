name: nemoclaw
version: "1.0.0"
type: agent
description: "NemoClaw — OpenClaw in sandboxed OpenShell with Bedrock inference (personal_assistant only)"

deps:
  - bedrockify

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.xlarge   # NemoClaw minimum: 4 vCPU / 8GB RAM

compatible_profiles:
  - personal_assistant            # ONLY profile — sandbox blocks AWS API access

params:
  - name: region
    description: "AWS region for Bedrock"
    default: us-east-1
  - name: model
    description: "Bedrock model ID (via bedrockify)"
    default: "us.anthropic.claude-sonnet-4-6"
  - name: bedrockify-port
    description: "Port where bedrockify is running"
    default: "8090"
  - name: sandbox-name
    description: "NemoClaw sandbox name"
    default: "loki-assistant"
  - name: telegram-token
    description: "Telegram bot token (optional, enables Telegram bridge)"
    default: ""
  - name: allowed-chat-ids
    description: "Comma-separated Telegram chat IDs (optional)"
    default: ""

health_check:
  # NemoClaw manages its own lifecycle — no systemd service
  # Uses default sandbox name; override sandbox-name param to change
  command: "nemoclaw ${NEMOCLAW_SANDBOX_NAME:-loki-assistant} status --json 2>/dev/null | jq -r .sandbox.status"
  expect: "running"
  timeout: 120
  poll_interval: 5

provides:
  commands:
    - nemoclaw
    - openshell
  services: []                    # NemoClaw manages its own lifecycle (not systemd)
