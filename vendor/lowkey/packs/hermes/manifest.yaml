name: hermes
version: "1.0.0"
type: agent
description: "NousResearch Hermes CLI agent via bedrockify"

deps:
  - bedrockify

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.medium

params:
  - name: region
    description: "AWS region for Bedrock"
    default: us-east-1
  - name: hermes-model
    description: "Bedrock model ID (resolved by bedrockify). Generic --model is ignored."
    default: "global.anthropic.claude-opus-4-6-v1"
  - name: bedrockify-port
    description: "Port where bedrockify is running"
    default: "8090"

health_check:
  command: "hermes --version"
  timeout: 10

provides:
  commands:
    - hermes
  services: []
