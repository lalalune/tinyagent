name: ironclaw
version: "1.2.0"
type: agent
description: "IronClaw — Rust-based AI agent by NEAR AI (experimental)"

# Native Bedrock requires --features bedrock at build time, which the
# pre-built release binary does not include. Route through bedrockify
# using openai_compatible backend until upstream ships a bedrock-enabled binary.
deps:
  - bedrockify

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.medium

params:
  - name: region
    description: "AWS region for Bedrock"
    default: us-east-1
  - name: model
    description: "Model ID for LLM_MODEL env var (via bedrockify)"
    default: "anthropic.claude-sonnet-4-6"
  - name: bedrockify-port
    description: "Port where bedrockify is running"
    default: "8090"

health_check:
  command: "ironclaw --version"
  timeout: 10

provides:
  commands:
    - ironclaw
  services: []
